<style>
:root{
  --crimson:#AD002D; --ink:#EEEEEE; --ink-dim:#9AA1B0; --panel:rgba(10,12,18,0.82);
  --hairline:rgba(238,238,238,0.14); --mono:"JetBrains Mono","SF Mono",ui-monospace,monospace;
  --sans:"Inter","Noto Sans JP",-apple-system,system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#05070C}
canvas{display:block}
#app{position:fixed;inset:0}
.hud{position:fixed;font-family:var(--sans);color:var(--ink);user-select:none;-webkit-user-select:none}
.mono{font-family:var(--mono)}
#topbar{top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:linear-gradient(rgba(5,7,12,0.75),rgba(5,7,12,0));z-index:10}
#brand{display:flex;flex-direction:column;gap:2px}
#logo{font-weight:700;font-size:17px;letter-spacing:0.22em;color:var(--ink)}
#logo em{font-style:normal;color:var(--crimson);margin-left:6px}
#tagline{font-size:10.5px;color:var(--ink-dim);letter-spacing:0.08em}
#tabs{display:flex;gap:6px;position:absolute;left:50%;transform:translateX(-50%)}
.tab{background:var(--panel);border:1px solid var(--hairline);color:var(--ink-dim);
  font-family:var(--mono);font-size:11px;letter-spacing:0.14em;padding:7px 16px;border-radius:4px;cursor:pointer;transition:all .2s}
.tab:hover{color:var(--ink);border-color:rgba(238,238,238,0.3)}
.tab.on{color:#fff;background:var(--crimson);border-color:var(--crimson)}
#right{display:flex;align-items:center;gap:12px}
#langBtn{background:none;border:1px solid var(--hairline);color:var(--ink-dim);font-family:var(--mono);
  font-size:10px;letter-spacing:0.1em;padding:6px 10px;border-radius:4px;cursor:pointer}
#langBtn:hover{color:var(--ink)}
#fps{font-size:10px;color:var(--ink-dim);min-width:44px;text-align:right}
.panel{background:var(--panel);border:1px solid var(--hairline);border-radius:6px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:14px 16px}
#stats{left:20px;bottom:20px;width:230px;z-index:10}
.srow{display:flex;justify-content:space-between;align-items:baseline;margin:5px 0}
.slabel{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-dim)}
.slabel.accent{color:var(--crimson);font-weight:600}
.sval{font-size:14px;color:var(--ink)}
.sval small{font-size:9px;color:var(--ink-dim)}
#jambar{height:3px;background:rgba(238,238,238,0.08);border-radius:2px;margin:4px 0 12px}
#jamfill{height:100%;width:0%;background:var(--crimson);border-radius:2px;transition:width .4s}
#sliderBlock{border-top:1px solid var(--hairline);padding-top:10px;margin-top:4px}
#humanSlider{width:100%;appearance:none;-webkit-appearance:none;height:3px;border-radius:2px;
  background:linear-gradient(90deg,var(--crimson),rgba(238,238,238,0.15));outline:none;margin:8px 0 4px}
#humanSlider::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#fff;border:3px solid var(--crimson);cursor:pointer}
#sliderHint{font-size:9.5px;color:var(--ink-dim);letter-spacing:0.04em}
#brainPanel{right:20px;top:64px;width:320px;z-index:10;display:none}
.phead{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-dim);margin:10px 0 6px}
.phead:first-child{margin-top:0}
#povView,#netView,#lossView{width:100%;border-radius:4px;background:#05070c;display:block}
.controlrow{display:flex;gap:14px;margin-top:10px;align-items:flex-end}
.gauge{flex:1}
.glabel{font-family:var(--mono);font-size:9px;color:var(--ink-dim);letter-spacing:0.14em;margin-bottom:4px}
#accelBar{position:relative;height:8px;background:rgba(238,238,238,0.08);border-radius:4px;overflow:hidden;margin-bottom:16px}
#accelFill{position:absolute;top:0;height:100%;width:0;border-radius:4px}
#autbar{height:4px;background:rgba(238,238,238,0.08);border-radius:2px;margin:2px 0 12px}
#autfill{height:100%;width:0%;background:linear-gradient(90deg,#5a0018,var(--crimson));border-radius:2px;transition:width .3s}
.accent2{color:var(--crimson)}
#resetBtn{width:100%;background:none;border:1px solid var(--hairline);border-radius:4px;color:var(--ink-dim);
  font-family:var(--mono);font-size:10px;letter-spacing:0.14em;padding:8px;cursor:pointer;text-transform:uppercase}
#resetBtn:hover{border-color:var(--crimson);color:var(--ink)}
#brainNote{font-size:9.5px;color:var(--ink-dim);line-height:1.5;margin-top:10px;letter-spacing:0.02em}
#credit{right:20px;bottom:20px;font-family:var(--mono);font-size:9.5px;color:var(--ink-dim);letter-spacing:0.06em;z-index:10}
#hintKeys{left:50%;transform:translateX(-50%);bottom:20px;font-family:var(--mono);font-size:10px;color:var(--ink-dim);letter-spacing:0.14em;z-index:10}
#intro{position:fixed;inset:0;background:#05070C;z-index:50;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;transition:opacity 1.4s ease;pointer-events:none}
#intro.gone{opacity:0}
#introTitle{font-family:var(--sans);font-weight:700;font-size:clamp(38px,7vw,84px);letter-spacing:0.26em;color:var(--ink);
  animation:introIn 2.6s cubic-bezier(0.16,1,0.3,1) both}
#introTitle em{font-style:normal;color:var(--crimson)}
#introSub{font-family:var(--mono);font-size:clamp(10px,1.4vw,13px);color:var(--ink-dim);letter-spacing:0.12em;
  animation:introIn 2.6s .5s cubic-bezier(0.16,1,0.3,1) both;text-align:center;padding:0 24px}
@keyframes introIn{from{opacity:0;transform:translateY(14px);letter-spacing:0.4em}to{opacity:1;transform:none}}
@media(max-width:820px){
  #tabs{position:static;transform:none}
  #tagline{display:none}
  #brainPanel{width:270px;top:auto;bottom:76px;right:12px;max-height:60vh;overflow:auto}
  #stats{width:200px;left:12px;bottom:12px}
  #hintKeys{display:none}
}
</style>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';

/* ============================================================
   NEURAL TOKYO
   1. CONFIG          — tunables, TDS tokens
   2. UTILS           — seeded rng, math helpers
   3. CITY            — procedural road graph + block parcels
   4. GEOMETRY        — merged buildings, roads, neon, lights
   5. TRAFFIC         — IDM + lane changes + intersections (S2)
   6. NEURAL          — pixel-input MLP, imitation learning (S4)
   7. RENDER          — scene, materials, post-processing
   8. DIRECTOR        — camera modes + intro (S5)
   9. HUD             — TDS panel UI, JA/EN (S5)
   10. MAIN LOOP
   ============================================================ */

try{
  const testGl = document.createElement('canvas').getContext('webgl2') || document.createElement('canvas').getContext('webgl');
  if(!testGl) throw new Error('no webgl');
}catch(e){
  document.body.innerHTML = '<div style="color:#EEEEEE;font-family:monospace;padding:40px;line-height:1.7">NEURAL TOKYO needs WebGL.<br>Please open in a modern browser (Chrome / Safari / Firefox / Edge).</div>';
  throw e;
}

/* ---------- 1. CONFIG ---------- */
const C = {
  seed: 20260706,
  fogColor: 0x0B0F1A, fogDensity: 0.0022,
  crimson: 0xAD002D,
  exposure: 1.12,
  bloom: { strength: 0.5, radius: 0.8, threshold: 0.38 },
};
const qs = new URLSearchParams(location.search);

/* ---------- 2. UTILS ---------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const rng = mulberry32(C.seed);
const R = (a=1,b)=> b===undefined ? rng()*a : a+rng()*(b-a);
const RI = (a,b)=> Math.floor(R(a,b+1));
const pick = arr => arr[Math.floor(rng()*arr.length)];
const clamp = (v,a,b)=> v<a?a:v>b?b:v;
const lerp = (a,b,t)=> a+(b-a)*t;

/* ---------- 3. REAL TOKYO DATA (Shibuya, OpenStreetMap) ----------
   Real road topology, real building footprints & heights, real signal
   positions, exported from OSM around the Shibuya scramble crossing.
   © OpenStreetMap contributors, ODbL.                                */
async function loadTokyo(){
  const el = document.getElementById('tokyo-data');
  if(el && el.textContent.length > 1000) return JSON.parse(el.textContent);
  const r = await fetch('shibuya.json');
  return r.json();
}
const TD = await loadTokyo();

/* ---- drivable road classes: width(m), lanes per direction, speed(m/s) ---- */
const ROADCLS = {
  trunk:       { w: 21, l: 2, v: 15.0, rank: 5 },
  primary:     { w: 16, l: 2, v: 13.5, rank: 4 },
  secondary:   { w: 13, l: 1, v: 12.0, rank: 3 },
  tertiary:    { w: 10, l: 1, v: 10.5, rank: 2 },
  unclassified:{ w: 7,  l: 1, v: 8.5,  rank: 1 },
  residential: { w: 7,  l: 1, v: 8.0,  rank: 1 },
  living_street:{ w: 5.5,l: 1, v: 6.0, rank: 0 },
  pedestrian:  { w: 8,  l: 1, v: 5.0,  rank: 0, noTraffic: true },
  service:     { w: 4.5,l: 1, v: 5.5,  rank: 0, noTraffic: true },
};
const half = 400; // scene radius for cameras/fog

/* ---- split OSM ways into edges at shared junction points ---- */
const kOf = (x,z) => Math.round(x*2) + '|' + Math.round(z*2);
const drivableWays = TD.roads.filter(w => ROADCLS[w.cls]);
{
  const occ = new Map();
  for(const w of drivableWays){
    const seen = new Set();
    for(const p of w.p){ const k = kOf(p[0],p[1]); if(!seen.has(k)){ seen.add(k); occ.set(k, (occ.get(k)||0)+1); } }
  }
  var edges = [];
  for(const w of drivableWays){
    let cur = [w.p[0]];
    for(let i=1;i<w.p.length;i++){
      cur.push(w.p[i]);
      const isJunction = i < w.p.length-1 && occ.get(kOf(w.p[i][0],w.p[i][1])) >= 2;
      if(isJunction || i === w.p.length-1){
        if(cur.length >= 2) edges.push({ pts: cur, cls: w.cls, one: w.one, lanesTag: w.lanes, wTag: w.w, name: w.n });
        cur = [w.p[i]];
      }
    }
  }
}
/* ---- edge geometry: lengths, lane counts, widths ---- */
function polyLen(pts){ let L=0; for(let i=1;i<pts.length;i++) L += Math.hypot(pts[i][0]-pts[i-1][0], pts[i][1]-pts[i-1][1]); return L; }
for(const e of edges){
  // strip consecutive duplicates
  e.pts = e.pts.filter((p,i,a)=> i===0 || Math.hypot(p[0]-a[i-1][0], p[1]-a[i-1][1]) > 0.15);
  const spec = ROADCLS[e.cls];
  e.len = polyLen(e.pts);
  const total = e.lanesTag || (e.one ? spec.l : spec.l*2);
  e.lanesF = e.one ? Math.max(1,total) : Math.max(1, Math.ceil(total/2));
  e.lanesB = e.one ? 0 : Math.max(1, Math.floor(total/2));
  e.width = Math.max(e.wTag || 0, spec.w, (e.lanesF+e.lanesB)*3.0);
  e.laneW = e.width/(e.lanesF+e.lanesB);
  e.spec = spec;
}
edges = edges.filter(e => e.pts.length >= 2 && e.len > 3);

/* ---- offset polyline (left-hand traffic lanes) ---- */
function offsetPoly(pts, off){
  const out = [];
  for(let i=0;i<pts.length;i++){
    const a = pts[Math.max(0,i-1)], b = pts[Math.min(pts.length-1,i+1)];
    let dx = b[0]-a[0], dz = b[1]-a[1];
    const l = Math.hypot(dx,dz)||1; dx/=l; dz/=l;
    out.push([ pts[i][0] + dz*off, pts[i][1] - dx*off ]); // left normal = (dz,-dx)
  }
  return out;
}
function cumOf(pts){ const c=[0]; for(let i=1;i<pts.length;i++) c.push(c[i-1] + Math.hypot(pts[i][0]-pts[i-1][0], pts[i][1]-pts[i-1][1])); return c; }

/* ---- directed lanes ---- */
const dirLanes = [];
const nodeMap = new Map();
function nodeOf(k, x, z){
  let n = nodeMap.get(k);
  if(!n){ n = { k, x, z, in:[], out:[], activeAxis:'z', switchedAt:-9, lastUse:{x:-9,z:-9}, signal:false, deg:0 }; nodeMap.set(k, n); }
  return n;
}
for(const e of edges){
  if(e.spec.noTraffic && !(e.cls==='pedestrian')) {} // service roads: keep drivable but low priority
  const dirs = e.one ? [1] : [1,-1];
  for(const dir of dirs){
    const nL = dir>0 ? e.lanesF : e.lanesB;
    for(let li=0; li<nL; li++){
      const basePts = dir>0 ? e.pts : e.pts.slice().reverse();
      const off = e.laneW*(li+0.5); // own side = left of travel
      const pts = offsetPoly(basePts, off);
      const cum = cumOf(pts);
      const p0 = basePts[0], p1 = basePts[basePts.length-1];
      const k0 = kOf(p0[0],p0[1]), k1 = kOf(p1[0],p1[1]);
      const dxT = p1[0]-p0[0], dzT = p1[1]-p0[1];
      const lane = {
        id: dirLanes.length, edge: e, cls: e.cls, pts, cum, len: cum[cum.length-1],
        cars: [[]], nLanes: 1, v0: e.spec.v, rank: e.spec.rank,
        axis: Math.abs(dxT) > Math.abs(dzT) ? 'x' : 'z',
        n0: k0, n1: k1, next: [], noTraffic: !!e.spec.noTraffic,
      };
      dirLanes.push(lane);
      nodeOf(k0, p0[0], p0[1]).out.push(lane);
      nodeOf(k1, p1[0], p1[1]).in.push(lane);
    }
  }
}
for(const n of nodeMap.values()) n.deg = n.in.length + n.out.length;
/* signals: mark nodes near an OSM traffic_signals point */
for(const s of TD.signals){
  let best = null, bd = 1e9;
  for(const n of nodeMap.values()){
    const d = (n.x-s[0])*(n.x-s[0]) + (n.z-s[1])*(n.z-s[1]);
    if(d < bd){ bd = d; best = n; }
  }
  if(best && bd < 20*20){ best.signal = true; }
}
/* lane heading helpers */
function laneHeadingAt(l, end){
  const p = l.pts, i = end ? p.length-1 : 0, j = end ? p.length-2 : 1;
  return Math.atan2(p[i][0]-p[j][0], p[i][1]-p[j][1]);
}
/* connectivity + turn weights (prefer continuing straight / same road) */
for(const l of dirLanes){
  const n = nodeMap.get(l.n1);
  const hIn = laneHeadingAt(l, true);
  for(const o of n.out){
    if(o.edge === l.edge && o.axis === l.axis && Math.abs(o.len - l.len) < 0.01 && o.n1 === l.n0) continue; // U-turn
    if(o.noTraffic && !l.noTraffic) continue;
    const hOut = laneHeadingAt(o, false);
    let dh = hOut - hIn;
    while(dh > Math.PI) dh -= 2*Math.PI; while(dh < -Math.PI) dh += 2*Math.PI;
    const straight = Math.abs(dh) < 0.35;
    const isLeft = dh < -0.35; // LHT: left turn is the near-side easy turn
    const w = (straight ? 0.66 : (isLeft ? 0.20 : 0.14)) * (0.5 + o.rank*0.25);
    l.next.push({ seg: o, turn: straight ? 'S' : (isLeft ? 'L' : 'R'), w });
  }
}
/* bezier connector between two lanes across a node */
function makeConnector(a, b){
  const P = a.pts, Q = b.pts;
  const p0 = P[P.length-1], p1 = Q[0];
  const h0 = laneHeadingAt(a, true), h1 = laneHeadingAt(b, false);
  const d0 = [Math.sin(h0), Math.cos(h0)], d1 = [Math.sin(h1), Math.cos(h1)];
  // intersect p0+t d0 with p1-u d1
  const det = d0[0]*(-d1[1]) - (-d1[0])*d0[1];
  let cx, cz;
  if(Math.abs(det) > 0.08){
    const rx = p1[0]-p0[0], rz = p1[1]-p0[1];
    const t = (rx*(-d1[1]) - (-d1[0])*rz)/det;
    if(t > 0 && t < 40){ cx = p0[0] + d0[0]*t; cz = p0[1] + d0[1]*t; }
  }
  if(cx === undefined){ cx = (p0[0]+p1[0])/2 + d0[0]*1.5; cz = (p0[1]+p1[1])/2 + d0[1]*1.5; }
  // approximate length
  let L = 0, lx = p0[0], lz = p0[1];
  for(let k=1;k<=8;k++){
    const t = k/8, mt = 1-t;
    const x = mt*mt*p0[0] + 2*mt*t*cx + t*t*p1[0];
    const z = mt*mt*p0[1] + 2*mt*t*cz + t*t*p1[1];
    L += Math.hypot(x-lx, z-lz); lx = x; lz = z;
  }
  return { x0:p0[0], z0:p0[1], cx, cz, x1:p1[0], z1:p1[1], len: Math.max(L, 0.5) };
}
/* sample a lane polyline at arc length s */
function laneSample(l, s, out){
  const cum = l.cum, pts = l.pts;
  const ss = clamp(s, 0, l.len);
  let lo = 0, hi = cum.length-1;
  while(hi - lo > 1){ const m = (lo+hi)>>1; if(cum[m] <= ss) lo = m; else hi = m; }
  const t = (ss - cum[lo]) / Math.max(cum[lo+1]-cum[lo], 1e-6);
  const a = pts[lo], b = pts[lo+1];
  out.x = a[0] + (b[0]-a[0])*t; out.z = a[1] + (b[1]-a[1])*t;
  out.yaw = Math.atan2(b[0]-a[0], b[1]-a[1]);
  return out;
}

/* ---------- 7. RENDER SETUP ---------- */
const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = C.exposure;
document.getElementById('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(C.fogColor, C.fogDensity);
const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.5, 3000);
camera.position.set(-half*0.7, 260, half*1.05);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x2c3550, 2.3));
const hemi = new THREE.HemisphereLight(0x33405e, 0x1a1410, 0.9); scene.add(hemi);
const moon = new THREE.DirectionalLight(0x4a5a8a, 0.7);
moon.position.set(-300, 400, 150); scene.add(moon);

/* ---------- sky ---------- */
{
  const geo = new THREE.SphereGeometry(2400, 24, 16);
  const mat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false,
    uniforms:{},
    vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader:`varying vec3 vP;
      void main(){
        float h = normalize(vP).y;
        vec3 zenith = vec3(0.003,0.004,0.010);
        vec3 horizon = vec3(0.030,0.026,0.038);
        vec3 col = mix(horizon, zenith, smoothstep(0.0,0.38,h));
        col += vec3(0.045,0.026,0.010) * pow(max(0.0, 1.0-abs(h*4.0)), 2.2);
        gl_FragColor = vec4(col,1.0);
      }`
  });
  scene.add(new THREE.Mesh(geo, mat));
}

/* ---------- ground: real road network painted from OSM polylines ---------- */
const citySize = 1000;
const GROUND_TEX = 4096;
function pathPoly(g, pts, S){
  g.beginPath();
  g.moveTo((pts[0][0]+citySize/2)*S, (pts[0][1]+citySize/2)*S);
  for(let i=1;i<pts.length;i++) g.lineTo((pts[i][0]+citySize/2)*S, (pts[i][1]+citySize/2)*S);
}
function buildGroundTexture(){
  const cv = document.createElement('canvas'); cv.width = cv.height = GROUND_TEX;
  const g = cv.getContext('2d');
  const S = GROUND_TEX / citySize;
  g.fillStyle = '#0C0E12'; g.fillRect(0,0,GROUND_TEX,GROUND_TEX);
  g.lineCap = 'round'; g.lineJoin = 'round';
  // sidewalks: wider, lighter stroke under each road
  for(const e of edges){
    g.strokeStyle = '#14161b';
    g.lineWidth = (e.width + (e.rank >= 3 ? 7 : 3.5)) * S;
    pathPoly(g, e.pts, S); g.stroke();
  }
  // pedestrian streets (Center-gai): warm pavement
  for(const w of TD.roads){
    if(w.cls !== 'pedestrian') continue;
    g.strokeStyle = '#1a1713';
    g.lineWidth = 8 * S;
    pathPoly(g, w.p, S); g.stroke();
  }
  // asphalt
  for(const e of edges){

function makeWindowTexture(variant){
  const cols = 10, rows = 22, cw = 32, ch = 40;
  const cv = document.createElement('canvas'); cv.width = cols*cw; cv.height = rows*ch;
  const g = cv.getContext('2d');
  g.fillStyle = '#000000'; g.fillRect(0,0,cv.width,cv.height);
  const warm = ['#ffd9a0','#ffc879','#f2e3c0','#e0cda0','#ffedd0'];
  const cool = ['#cfe0ff','#b8cfff','#dde8fa','#9fc4e8'];
  const litRatio = [0.20, 0.30, 0.13, 0.25][variant % 4];
  // faint floor slab lines
  g.fillStyle = 'rgba(60,64,74,0.35)';
  for(let r=1;r<rows;r++) g.fillRect(0, r*ch-1, cv.width, 2);
  for(let r=1;r<rows;r++) for(let c=0;c<cols;c++){
    const wx = c*cw + 6, wy = (rows-r)*ch - ch + 10, ww = cw-12, wh = ch-19;
    if(Math.random() < litRatio){
      const pal = Math.random() < 0.6 ? warm : cool;
      const col = pal[Math.floor(Math.random()*pal.length)];
      const bright = 0.28 + Math.random()*0.72;
      g.globalAlpha = bright; g.fillStyle = col;
      g.fillRect(wx, wy, ww, wh);
      // occasional half-drawn curtain
      if(Math.random()<0.28){ g.globalAlpha = bright*0.35; g.fillStyle='#000'; g.fillRect(wx, wy, ww, wh*R(0.3,0.6)); }
      // frame mullion
      g.globalAlpha = bright*0.8; g.fillStyle = 'rgba(0,0,0,0.8)';
      g.fillRect(wx + ww/2 - 1, wy, 2, wh);
    } else if(Math.random() < 0.25){
      // dark glass catching sky
      g.globalAlpha = 0.10 + Math.random()*0.08; g.fillStyle = '#37415a';
      g.fillRect(wx, wy, ww, wh);
    }
  }
  // ground floor: storefronts (texture row r=0 is v=0 → building base)
  for(let c=0;c<cols;c++){
    const lit = Math.random() < 0.55;
    const wy = (rows-1)*ch;
    if(lit){
      const col = Math.random()<0.5 ? '#ffe6b8' : (Math.random()<0.5 ? '#eaf2ff' : '#ffd2c2');
      g.globalAlpha = 0.30 + Math.random()*0.30; g.fillStyle = col;
      g.fillRect(c*cw + 2, wy + 6, cw - 4, ch - 10);
      g.globalAlpha = 0.9; g.fillStyle = 'rgba(0,0,0,0.85)';
      g.fillRect(c*cw + 2, wy + 6, cw - 4, 3);
    }
  }
  g.globalAlpha = 1;
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// merged box with UVs proportional to size (windows keep aspect)
function pushBox(arrs, x, z, w, d, h, uOff, vOff){
  const {pos, norm, uv, idx} = arrs;
  const x0=x-w/2, x1=x+w/2, z0=z-d/2, z1=z+d/2;
  const cellW = 2.6, cellH = 3.1; // meters per window cell
  const uRep = Math.max(1, Math.round(w/cellW)), vRep = Math.max(1, Math.round(h/cellH));
  const uRepD = Math.max(1, Math.round(d/cellW));
  const faces = [
    // +Z front
    { v:[[x0,0,z1],[x1,0,z1],[x1,h,z1],[x0,h,z1]], n:[0,0,1],  ur:uRep },
    // -Z back
    { v:[[x1,0,z0],[x0,0,z0],[x0,h,z0],[x1,h,z0]], n:[0,0,-1], ur:uRep },
    // +X right
    { v:[[x1,0,z1],[x1,0,z0],[x1,h,z0],[x1,h,z1]], n:[1,0,0],  ur:uRepD },
    // -X left
    { v:[[x0,0,z0],[x0,0,z1],[x0,h,z1],[x0,h,z0]], n:[-1,0,0], ur:uRepD },
  ];
  for(const f of faces){
    const base = pos.length/3;
    for(const p of f.v) pos.push(p[0], p[1], p[2]);
    for(let k=0;k<4;k++) norm.push(f.n[0], f.n[1], f.n[2]);
    const ur = f.ur/10, vr = vRep/22; // texture is 10x22 cells
    uv.push(uOff,vOff, uOff+ur,vOff, uOff+ur,vOff+vr, uOff,vOff+vr);
    idx.push(base, base+1, base+2, base, base+2, base+3);
  }
  // roof (dark)
  const base = pos.length/3;
  pos.push(x0,h,z0, x1,h,z0, x1,h,z1, x0,h,z1);
  for(let k=0;k<4;k++) norm.push(0,1,0);
  uv.push(0,0, 0.001,0, 0.001,0.001, 0,0.001);
  idx.push(base, base+2, base+1, base, base+3, base+2);
}

/* ---- car fleet ---- */
const PROFILES = {
  av:    { T: 0.85, s0: 1.8, aMax: 2.7, bCom: 3.0, v0mul: 1.05, react: 0,    jitter: 0 },
  human: { T: 2.0,  s0: 2.8, aMax: 1.5, bCom: 2.0, v0mul: 0.95, react: 0.7, jitter: 0.18 },
};
const N_CARS = +(qs.get('cars') || 1200);

function spawnCar(k){
  // find a segment with room
  for(let tries=0;tries<80;tries++){
    const s = spawnable[RI(0,spawnable.length-1)];
    const L = 0;
    const arr = s.cars[L];

      brake: false, blocked: false,
      percGap: 50, percDv: 0, reactT: 0,
      distract: R(4, 40),
      granted: null, inNode: null,
      hero: false,
    };
    arr.push(car); arr.sort((a,b)=>a.s-b.s);

  }

}
let humanRatio = +(qs.get('human') ?? 0.12);

// hero car: prefer an avenue z-segment near center
let hero = cars.find(c => c.seg.rank >= 3 && c.seg.len > 60) || cars.find(c => c.seg.rank >= 2) || cars[0];
hero.hero = true; hero.prof = 'av'; hero.color = C.crimson;

function segSpeedLimit(s){ return s.v0; }

function chooseNext(car){
  const opts = car.seg.next;
  if(!opts.length) return null;
  if(car.hero){
    // hero stays near the scramble & prefers big roads
    let best = opts[0], bd = 1e9;
    for(const o of opts){
      const en = nodeMap.get(o.seg.n1);
      const d = Math.hypot(en.x, en.z) + (o.turn==='S' ? -50 : 0) - o.seg.rank*22 + (o.seg.len < 25 ? 60 : 0);
      if(d < bd){ bd = d; best = o; }
    }
    return best;
  }
  let sum = 0; for(const o of opts) sum += o.w;
  let r = rng()*sum;
  for(const o of opts){ r -= o.w; if(r <= 0) return o; }
  return opts[opts.length-1];
}

/* intersection arbitration: alternating axis, AVs switch fast, humans slow */
function nodeAllows(car, node, now){
  const axis = car.seg.axis;
  if(node.activeAxis === axis) return true;
  // time-sliced arbitration: switch when current axis exceeds max hold OR goes idle.
  // AV-dominant traffic negotiates micro-slots (short holds, tiny clearance);
  // human-dominant traffic needs long holds and sluggish handoffs.
  const av = avShare();
  const maxHold = lerp(7.0, 1.3, av*av);
  const idleGap = lerp(1.8, 0.28, av*av);
  if(now - (node.switchedAt || -9) > maxHold || now - node.lastUse[node.activeAxis] > idleGap){
    node.activeAxis = axis; node.switchedAt = now;
    return true;
  }
  return false;
}
function avShare(){ return 1 - humanRatio; }

/* IDM step */
const IDM_LOOK = 90;
let simTime = 0, flowCount = 0;
function trafficStep(dt){
  simTime += dt;
  const now = simTime;
  for(const s of segs){
    const lim = segSpeedLimit(s);
    for(let L=0;L<s.nLanes;L++){
      const arr = s.cars[L];
      for(let idx=0; idx<arr.length; idx++){
        const car = arr[idx];
        if(car.isPhantom) continue;
        const P = PROFILES[car.prof];
        const v0 = lim * car.v0base * P.v0mul;
        // gap to leader
        let gap = 1e4, dv = 0;
        if(idx < arr.length-1){
          const lead = arr[idx+1];
          gap = lead.s - car.s - 4.4; dv = car.v - lead.v;
        } else {
          // look across node into next seg (same lane if possible)
          const rem = s.len - car.s;
          const nx = car.nextChoice;
          if(nx){
            const ns = nx.seg;
            const narr = ns.cars[0];
            if(narr.length){
              const lead = narr[0];
              const nodeSpan = nodeMap.get(s.n1).r * 2;
              gap = rem + nodeSpan + lead.s - 4.4; dv = car.v - lead.v;
            }
          }
          // intersection stop line
          const node = nodeMap.get(s.n1);
          if(rem < 26){
            car.granted = car.granted && car.granted.node === node ? car.granted : null;
            const allowed = nodeAllows(car, node, now) ;
            if(allowed){ node.lastUse[s.axis] = now; }
            else {
              const stopGap = rem - 0.8;
              if(stopGap < gap){ gap = stopGap; dv = car.v; }
            }
          }
        }
        // human perception delay + distraction
        let eGap = gap, eDv = dv;
        if(P.react > 0){
          car.reactT -= dt;
          if(car.reactT <= 0){ car.percGap = gap; car.percDv = dv; car.reactT = P.react * R(0.6, 1.4); }
          eGap = car.percGap; eDv = car.percDv;
          car.distract -= dt;
          if(car.distract < 0){
            car.distract = R(10, 45);
            car.v = Math.max(0, car.v - R(2.5, 5)); // random brake tap → phantom jam seed
          }
        }
        eGap = Math.max(0.15, eGap);
        const sStar = P.s0 + Math.max(0, car.v*P.T + (car.v*eDv)/(2*Math.sqrt(P.aMax*P.bCom)));
        let acc = P.aMax * (1 - Math.pow(car.v/v0, 4) - (sStar/eGap)*(sStar/eGap));
        acc = clamp(acc, -6.5, P.aMax);
        car.brake = acc < -0.7;
        car.v = Math.max(0, car.v + acc*dt);
        car.s += car.v * dt;
      }
      // remove cars that passed the end → transfer
      for(let idx=arr.length-1; idx>=0; idx--){
        const car = arr[idx];
        if(car.s >= s.len){
          if(!car.nextChoice) car.nextChoice = chooseNext(car);
          const nx = car.nextChoice;
          arr.splice(idx,1);
          if(car.isPhantom){ continue; }
          flowCount++;
          if(nx){
            const ns = nx.seg;
            car.conn = makeConnector(s, ns);
            car.seg = ns; car.lane = 0;
            car.s = car.s - s.len - car.conn.len;
            if(car.s > -0.01) car.s = 0.01;
            car.nextChoice = null;
            ns.cars[0].push(car);
            ns.cars[0].sort((a,b)=>a.s-b.s);
          } else {
            // dead end (bbox boundary): respawn somewhere with room
            let placed = false;
            for(let tries=0; tries<60 && !placed; tries++){
              const ns = spawnable[Math.floor(Math.random()*spawnable.length)];
              const pos2 = 3 + Math.random()*(ns.len-6);
              let ok = true;
              for(const o of ns.cars[0]){ if(Math.abs(o.s - pos2) < 8){ ok = false; break; } }
              if(!ok) continue;
              car.seg = ns; car.lane = 0; car.s = pos2; car.v = 3; car.conn = null; car.nextChoice = null;
              ns.cars[0].push(car); ns.cars[0].sort((a2,b2)=>a2.s-b2.s);
              placed = true;
            }
            if(!placed) car.seg = null;
          }
        }
      }
    }
  }
  // pre-pick next choice when close to end (for lookahead)
  for(const car of cars){
    if(car.seg && !car.nextChoice && (car.seg.len - car.s) < 40) car.nextChoice = chooseNext(car);
  }
}

/* world position of a car (polyline lanes + bezier connectors) */
function carPose(car, out){
  if(car.s >= 0){
    laneSample(car.seg, car.s, out);
  } else if(car.conn){
    const c = car.conn;
    const t = clamp(1 + car.s / c.len, 0, 1);
    const mt = 1 - t;
    out.x = mt*mt*c.x0 + 2*mt*t*c.cx + t*t*c.x1;
    out.z = mt*mt*c.z0 + 2*mt*t*c.cz + t*t*c.z1;
    const dx = 2*mt*(c.cx-c.x0) + 2*t*(c.x1-c.cx);
    const dz = 2*mt*(c.cz-c.z0) + 2*t*(c.z1-c.cz);
    out.yaw = Math.atan2(dx, dz);
  } else {
    laneSample(car.seg, 0, out);
  }
  return out;
}

/* ---------- 6. NEURAL ENGINE ----------
   A real multilayer perceptron, trained live in the browser.
   Input: 48x16 grayscale pixels from the hero car's front camera (rendered
   by WebGL, read back each frame) + current speed. Output: [steer, accel].
   Learning: behavioral cloning of a classical teacher controller

   No ML libraries. Plain typed arrays and backprop below.            */
const NNCFG = { W: 48, H: 16, sizes: [48*16+1, 48, 24, 2], lr: 0.004, mom: 0.9, batch: 16, ksteps: 4, buf: 4096 };
function makeNN(){
  const L = NNCFG.sizes.length - 1;

  const gauss = () => { let u=0,v=0; while(!u)u=r(); while(!v)v=r(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); };
  for(let l=0;l<L;l++){
    const nIn = NNCFG.sizes[l], nOut = NNCFG.sizes[l+1];
    const w = new Float32Array(nIn*nOut);
    const sc = Math.sqrt(2/nIn);
    for(let i=0;i<w.length;i++) w[i] = gauss()*sc;
    W.push(w); b.push(new Float32Array(nOut));
    vW.push(new Float32Array(nIn*nOut)); vb.push(new Float32Array(nOut));
    act.push(new Float32Array(nOut));

    const nIn = NNCFG.sizes[l], nOut = NNCFG.sizes[l+1];
    for(let j=0;j<nOut;j++){

      const off = j*nIn;
      for(let i=0;i<nIn;i++) s += w[off+i]*inp[i];

}
// backprop one sample, accumulate grads
function nnTrainBatch(samples){
  const L = nn.W.length;
  const gW = nn.W.map(w => new Float32Array(w.length));
  const gb = nn.b.map(b => new Float32Array(b.length));
  let loss = 0;
  const acts = [];
  for(const {x, y} of samples){
    // forward, storing activations
    let inp = x; acts.length = 0; acts.push(x);
    for(let l=0;l<L;l++){
      const w = nn.W[l], bb = nn.b[l];
      const nIn = NNCFG.sizes[l], nOut = NNCFG.sizes[l+1];
      const out = new Float32Array(nOut);
      for(let j=0;j<nOut;j++){
        let s = bb[j]; const off = j*nIn;
        for(let i=0;i<nIn;i++) s += w[off+i]*inp[i];
        out[j] = Math.tanh(s);
      }
      acts.push(out); inp = out;
    }
    const out = acts[L];
    // MSE loss grad
    let delta = new Float32Array(out.length);
    for(let j=0;j<out.length;j++){
      const e = out[j] - y[j];
      loss += e*e;
      delta[j] = 2*e*(1 - out[j]*out[j]);
    }
    for(let l=L-1;l>=0;l--){
      const nIn = NNCFG.sizes[l], nOut = NNCFG.sizes[l+1];
      const a = acts[l], w = nn.W[l];
      const gw = gW[l], gbb = gb[l];
      for(let j=0;j<nOut;j++){
        const off = j*nIn, d = delta[j];
        gbb[j] += d;
        for(let i=0;i<nIn;i++) gw[off+i] += d*a[i];

    if(node && !nodeAllows({seg}, node, simTime)){
      if(rem - 0.8 < gap){ gap = rem - 0.8; dv = heroCtl.v; }
    } else if(node) node.lastUse[seg.axis] = simTime;
  }
  const P0 = PROFILES.av;
  const v0 = seg.v0*0.95;
  gap = Math.max(0.2, gap);
  const sStar = P0.s0 + Math.max(0, heroCtl.v*P0.T + (heroCtl.v*dv)/(2*Math.sqrt(P0.aMax*P0.bCom)));
  let accT = P0.aMax * (1 - Math.pow(heroCtl.v/v0, 4) - (sStar/gap)*(sStar/gap));
  accT = clamp(accT/2.5, -1, 1);
  heroCtl.teach = [steerT, accT];
  return heroCtl.teach;
}
function heroPhysics(steer, accel, dt){
  heroCtl.steer = lerp(heroCtl.steer, steer*0.55, clamp(dt*8,0,1));
  const a = accel * 2.5;
  heroCtl.v = clamp(heroCtl.v + a*dt, 0, 17);
  const L = 2.7;
  heroCtl.yaw += (heroCtl.v / L) * Math.tan(heroCtl.steer) * dt;
  heroCtl.x += Math.sin(heroCtl.yaw) * heroCtl.v * dt;
  heroCtl.z += Math.cos(heroCtl.yaw) * heroCtl.v * dt;
  heroCtl.dist += heroCtl.v * dt;
  heroCtl.sinceTakeover += heroCtl.v * dt;
}

/* ---- POV camera + input pipeline ---- */
const povRT = new THREE.WebGLRenderTarget(96, 32, { samples: 0 });
const povCam = new THREE.PerspectiveCamera(105, 3, 0.4, 260);
const povBuf = new Uint8Array(96*32*4);
const povInput = new Float32Array(NNCFG.sizes[0]);
let povCanvas = null, povCtx = null; // HUD, set later
function readPOV(){
  const fx = Math.sin(heroCtl.yaw), fz = Math.cos(heroCtl.yaw);
  povCam.position.set(heroCtl.x + fx*1.9, 1.25, heroCtl.z + fz*1.9);
  povCam.lookAt(heroCtl.x + fx*30, 0.7, heroCtl.z + fz*30);
  const oldFog = scene.fog.density;
  scene.fog.density = 0.004;
  const oldExp = renderer.toneMappingExposure;
  renderer.toneMappingExposure = 2.0;
  topGlowIM.visible = false;
  renderer.setRenderTarget(povRT);
  renderer.render(scene, povCam);
  renderer.setRenderTarget(null);
  renderer.toneMappingExposure = oldExp;
  scene.fog.density = oldFog;
  renderer.readRenderTargetPixels(povRT, 0, 0, 96, 32, povBuf);
  // downsample 96x32 → 48x16, grayscale w/ sqrt boost
  for(let y=0;y<16;y++) for(let x=0;x<48;x++){
    let acc = 0;
    for(let sy=0;sy<2;sy++) for(let sx=0;sx<2;sx++){
      const yy = y*2+sy, xx = x*2+sx;
      const o = ((31-yy)*96 + xx)*4; // flip Y (GL origin bottom-left)
      acc += (povBuf[o]*0.35 + povBuf[o+1]*0.45 + povBuf[o+2]*0.2);
    }
    povInput[y*48+x] = Math.sqrt(clamp(acc/(4*255), 0, 1)) * 2 - 1;
  }
  povInput[48*16] = heroCtl.v/17 * 2 - 1;
  return povInput;
}

/* ---- neural drive step (called in BRAIN mode) ---- */
let neuralOn = false;
const heroPhantom = { s: 0, v: 0, isPhantom: true, brake: false };
let phantomLoc = null;
function neuralStep(dt){
  heroActivate();
  const teach = heroTeacher(dt);
  const x = readPOV();
  const out = nnForward(x);
  heroCtl.lastOut = [out[0], out[1]];
  // DAgger takeover on lane departure / heading error
  const departed = Math.abs(heroCtl.eLat) > 1.7;
  if(departed && heroCtl.recoverT <= 0){
    heroCtl.recoverT = 2.5; heroCtl.takeovers++; heroCtl.sinceTakeover = 0;
  }
  if(heroCtl.recoverT > 0) heroCtl.recoverT -= dt;
  // autonomy: grows as loss falls (floor 0.15 so learning is visible)
  const targetAut = heroCtl.recoverT > 0 ? 0 : clamp(1.15 - nn.loss*9, 0.15, 1);
  heroCtl.autonomy = lerp(heroCtl.autonomy, targetAut, clamp(dt*1.5,0,1));
  const a = heroCtl.autonomy;
  const steer = (1-a)*teach[0] + a*out[0];
  const accel = (1-a)*teach[1] + a*out[1];
  heroPhysics(steer, accel, dt);
  // collect training data (teacher labels, on-policy states)
  replay.push(Float32Array.from(x), Float32Array.from(teach));
  // train
  if(replay.X.length > 64){
    let acc = 0;
    for(let k=0;k<NNCFG.ksteps;k++) acc += nnTrainBatch(replay.sample(NNCFG.batch));
    const cur = acc/NNCFG.ksteps;
    nn.loss = nn.loss*0.97 + cur*0.03;
    if(nn.steps % 12 === 0){ nn.lossHist.push(nn.loss); if(nn.lossHist.length > 160) nn.lossHist.shift(); }
  }
  // phantom obstacle so other cars see the hero
  const P = heroCtl.path;
  if(P.length){
    const cur = P[0].seg;
    if(phantomLoc && (phantomLoc.seg !== P[0].seg || phantomLoc.lane !== P[0].lane)){
      const arr = phantomLoc.seg.cars[phantomLoc.lane];
      const i = arr.indexOf(heroPhantom); if(i>=0) arr.splice(i,1);
      phantomLoc = null;
    }
    if(!phantomLoc){
      phantomLoc = { seg: P[0].seg, lane: Math.min(P[0].lane, P[0].seg.nLanes-1) };
      const arr = phantomLoc.seg.cars[phantomLoc.lane];
      arr.push(heroPhantom);
    }
    heroPhantom.s = P[0].s; heroPhantom.v = heroCtl.v;
    phantomLoc.seg.cars[phantomLoc.lane].sort((a,b)=>a.s-b.s);
  }
}

function updateQfront(t){

  const g = qfrontCtx;

  } else {
    g.fillStyle = '#0a0f18'; g.fillRect(0,0,512,288);

    for(let x=0;x<=512;x+=8){

/* cinematic grade: S-curve contrast, teal shadows / warm highlights, vignette, grain, subtle CA */
const gradePass = new ShaderPass({
  uniforms: { tDiffuse: { value: null }, uTime: { value: 0 } },
  vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float uTime; varying vec2 vUv;
    void main(){
      vec2 uv = vUv;
      float d = distance(uv, vec2(0.5));
      vec2 ca = (uv - 0.5) * d * d * 0.0045;
      vec3 c;
      c.r = texture2D(tDiffuse, uv + ca).r;
      c.g = texture2D(tDiffuse, uv).g;
      c.b = texture2D(tDiffuse, uv - ca).b;
      vec3 s = c*c*(3.0-2.0*c);
      c = mix(c, s, 0.42);
      float l = dot(c, vec3(0.299,0.587,0.114));
      c += (1.0-smoothstep(0.0,0.42,l)) * vec3(-0.010,0.005,0.028);
      c += smoothstep(0.55,1.0,l) * vec3(0.028,0.012,-0.010);
      c = mix(vec3(l), c, 1.13);
      c *= 1.0 - smoothstep(0.55, 1.1, d)*0.32;
      float g = fract(sin(dot(uv + fract(uTime*0.31), vec2(12.9898,78.233))) * 43758.5453);
      c += (g-0.5) * 0.028;
      gl_FragColor = vec4(c, 1.0);
    }`
});
composer.addPass(gradePass);

function drawBrain(){
  // camera input
  const iw = 48, ih = 16;
  const cw = povView.width/iw, ch = povView.height/ih;
  for(let y=0;y<ih;y++) for(let x=0;x<iw;x++){

    povVC.fillRect(x*cw, y*ch, cw+0.5, ch+0.5);
  }
  // network: input summary (16 pooled) → 48 → 24 → 2
  netVC.clearRect(0,0,netView.width,netView.height);
  const cols = [
    { n: 16, get: i => { let a=0; for(let k=0;k<48;k++) a += povInput[i*48+k]; return Math.tanh(a/24); } },
    { n: 24, get: i => nn.act[0][i*2] },
    { n: 24, get: i => nn.act[1][i] },
    { n: 2,  get: i => nn.act[2][i] },
  ];
  const X = [16, 106, 196, 272];
  // connections (light)
  netVC.globalAlpha = 0.22;
  for(let c=0;c<cols.length-1;c++){
    const n0 = cols[c].n, n1 = cols[c+1].n;
    for(let j=0;j<n1;j++){
      const a1 = cols[c+1].get(j);
      if(Math.abs(a1) < 0.25) continue;
      const y1 = 10 + (netView.height-20) * (n1===1?0.5:j/(n1-1));
      for(let i=0;i<n0;i+=2){
        const a0 = cols[c].get(i);
        if(Math.abs(a0) < 0.3) continue;
        const y0 = 10 + (netView.height-20) * (n0===1?0.5:i/(n0-1));
        netVC.strokeStyle = (a0*a1 > 0) ? '#AD002D' : '#3a4358';
        netVC.beginPath(); netVC.moveTo(X[c], y0); netVC.lineTo(X[c+1], y1); netVC.stroke();
      }
    }
  }
  netVC.globalAlpha = 1;
  for(let c=0;c<cols.length;c++){
    const n = cols[c].n;
    for(let i=0;i<n;i++){
      const y = 10 + (netView.height-20) * (n===1?0.5:i/(n-1));
      const a = cols[c].get(i);
      const r = c===cols.length-1 ? 5 : 3;
      const mag = clamp(Math.abs(a),0,1);
      netVC.beginPath(); netVC.arc(X[c], y, r, 0, Math.PI*2);
      if(a > 0) netVC.fillStyle = `rgba(${120+135*mag|0},${20+30*mag|0},${45+40*mag|0},${0.35+0.65*mag})`;
      else netVC.fillStyle = `rgba(${40+60*mag|0},${52+80*mag|0},${75+110*mag|0},${0.35+0.65*mag})`;
      netVC.fill();
    }
  }
  // labels for outputs
  netVC.fillStyle = '#9AA1B0'; netVC.font = '9px JetBrains Mono, monospace';
  netVC.fillText('steer', 236, 14 );
  netVC.fillText('accel', 236, netView.height - 8);
  // loss sparkline
  lossVC.clearRect(0,0,lossView.width,lossView.height);
  lossVC.strokeStyle = '#AD002D'; lossVC.lineWidth = 1.5;
  lossVC.beginPath();
  const H = nn.lossHist;
  const maxL = Math.max(0.05, ...H);
  H.forEach((v,i)=>{
    const x = i/(160-1)*lossView.width;
    const y = lossView.height - 3 - (v/maxL)*(lossView.height-8);
    i ? lossVC.lineTo(x,y) : lossVC.moveTo(x,y);
  });
  lossVC.stroke();
  // steering gauge
  steerVC.clearRect(0,0,86,44);
  steerVC.strokeStyle = '#2a3040'; steerVC.lineWidth = 4;
  steerVC.beginPath(); steerVC.arc(43, 42, 30, Math.PI, 0); steerVC.stroke();
  const sAng = Math.PI + (heroCtl.lastOut[0]*0.5 + 0.5) * Math.PI;
  steerVC.strokeStyle = '#AD002D'; steerVC.lineWidth = 3;
  steerVC.beginPath(); steerVC.moveTo(43,42);
  steerVC.lineTo(43 + Math.cos(sAng)*28, 42 + Math.sin(sAng)*28); steerVC.stroke();
  // accel bar
  const af = document.getElementById('accelFill');
  const a = heroCtl.lastOut[1];
  af.style.width = Math.abs(a)*50 + '%';
  af.style.left = a >= 0 ? '50%' : (50 - Math.abs(a)*50) + '%';
  af.style.background = a >= 0 ? '#3ec98a' : '#AD002D';
  document.getElementById('vLoss').textContent = nn.loss.toFixed(4);
  document.getElementById('vSteps').textContent = nn.steps.toLocaleString();
  document.getElementById('vTake').textContent = heroCtl.takeovers;
  document.getElementById('vDist').textContent = Math.round(heroCtl.sinceTakeover).toLocaleString();
  const autPct = Math.round(heroCtl.autonomy*100);
  document.getElementById('vAut').textContent = autPct + '%';
  document.getElementById('autfill').style.width = autPct + '%';
}

/* ---------- 10. MAIN LOOP ---------- */
let t0 = performance.now(), lastT = 0, frame = 0;
let fpsAcc = 0, fpsN = 0, lastFlowT = 0, flowRate = 0, lastFlowCount = 0;
const shotMode = qs.get('shot');
{
  const warm = +(qs.get('t') || 0);
  for(let k=0;k<warm*30;k++) trafficStep(1/30);
}
if(shotMode){ document.getElementById('intro').style.display = 'none'; }
else setTimeout(()=>{ document.getElementById('intro').classList.add('gone'); }, 3400);
setMode(shotMode === 'hero' ? 'chase' : (shotMode === 'brain' ? 'brain' : mode));

function heroPoseNow(out){
  if(heroCtl.free){ out.x = heroCtl.x; out.z = heroCtl.z; out.yaw = heroCtl.yaw; }
  else if(hero.seg) carPose(hero, out);
  return out;
}
window.__cars = () => cars;
window.__dbg = () => ({ mode, steps: nn.steps, replayN: replay.X.length, loss: nn.loss,
  free: heroCtl.free, aut: heroCtl.autonomy, pathN: heroCtl.path.length, heroV: heroCtl.v,
  hx: Math.round(heroCtl.x), hz: Math.round(heroCtl.z), eLat: +heroCtl.eLat.toFixed(2), take: heroCtl.takeovers });
function loop(){
  const t = (performance.now() - t0) / 1000;
  let dt = Math.min(t - lastT, 0.1); lastT = t;
  fpsAcc += dt; fpsN++;
  if(fpsAcc > 0.5){
    const fps = fpsN/fpsAcc;
    document.getElementById('fps').textContent = Math.round(fps) + ' fps';
    // auto quality: drop pixel ratio once if the device can't keep up
    if(t > 8 && fps < 27 && !loop.qDropped){ loop.qDropped = true; renderer.setPixelRatio(1); composer.setPixelRatio && composer.setPixelRatio(1); }
    fpsAcc = 0; fpsN = 0;
  }
  const steps = clamp(Math.round(dt/(1/60)), 1, 4);
  for(let k=0;k<steps;k++) trafficStep(dt/steps);
  if(mode === 'brain') neuralStep(Math.min(dt, 1/20));
  else if(heroCtl.free){ heroTeacher(dt); heroPhysics(heroCtl.teach[0], heroCtl.teach[1], dt); }
  updateCarInstances(dt);
  if(frame % 6 === 0) updateSignalLamps();
  updateHeadlights();
  // ------ camera ------
  const hp = heroPoseNow({x:0,z:0,yaw:0});
  if(shotMode === 'overview' || (!shotMode && mode === 'city')){
    const ang = t * 0.018 + 2.4;
    const rad = 195 + 40*Math.sin(t*0.05);
    wantPos.set(Math.cos(ang)*rad, 235 + 40*Math.sin(t*0.03), Math.sin(ang)*rad);
    wantLook.set(0, 0, 0);
  } else if(shotMode === 'fixed'){
    // static QA camera above a busy crossing: pure car trajectories
    wantPos.set(38, 70, 46); wantLook.set(0, 0, 0);
    camPos.copy(wantPos); camLook.copy(wantLook);
  } else if(shotMode === 'street'){
    // fixed low camera over the scramble crossing
    wantPos.set(38 - (t*2)%20, 2.4, 44);
    wantLook.set(0, 2.2, 0);
    camPos.copy(wantPos); camLook.copy(wantLook);
  } else { // chase / brain
    const fx = Math.sin(hp.yaw), fz = Math.cos(hp.yaw);
    const back = mode==='brain' ? 8.2 : 9.5;
    const off = mode==='brain' ? 2.0 : 2.6;
    wantPos.set(hp.x - fx*back - fz*off, mode==='brain'?3.1:3.6, hp.z - fz*back + fx*off);
    wantLook.set(hp.x + fx*10, 1.1, hp.z + fz*10);
  }
  const k = 1 - Math.exp(-dt*2.6);
  camPos.lerp(wantPos, k); camLook.lerp(wantLook, k);
  camera.position.copy(camPos);
  camera.lookAt(camLook);
  // ------ ambience ------
  updateRain(dt);
  aviLights.material.color.setHex((Math.sin(t*2.2) > 0.2) ? 0xff1a2e : 0x550a10);
  gradePass.uniforms.uTime.value = t;
  if(frame % 4 === 0) updateQfront(t);
  scene.fog.density = lerp(0.0026, 0.0007, clamp((camera.position.y - 10)/380, 0, 1));
  topGlowIM.visible = camera.position.y > 70;
  // ------ HUD ------
  if(frame % 10 === 0){
    let vSum = 0, jam = 0;
    for(const car of cars){ if(!car.seg) continue; vSum += car.v; if(car.v < 1.0) jam++; }
    document.getElementById('vCars').textContent = cars.length.toLocaleString();
    document.getElementById('vSpeed').innerHTML = (vSum/cars.length*3.6).toFixed(1) + '<small> km/h</small>';
    const jp = Math.round(jam/cars.length*100);
    document.getElementById('vJam').textContent = jp + '%';
    document.getElementById('jamfill').style.width = jp + '%';
    if(simTime - lastFlowT > 2){ flowRate = (flowCount - lastFlowCount)/(simTime - lastFlowT)*60; lastFlowT = simTime; lastFlowCount = flowCount; }
    document.getElementById('vFlow').textContent = Math.round(flowRate).toLocaleString();
  }
  if(mode === 'brain' && frame % 2 === 0) drawBrain();
  frame++;
  composer.render();
  requestAnimationFrame(loop);
}
loop();
</script>
